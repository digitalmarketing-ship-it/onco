<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orchid Samagati Cancer Centre</title>
    <style>
        /* Base Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Fullscreen Loader Container (Visible Instantly) */
        .loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        /* Animation Stage Container */
        .animation-stage {
            position: relative;
            width: 550px;
            height: 160px;
            border-bottom: 4px solid #004b87; /* Navy Blue Road */
            overflow: hidden;
            margin-bottom: 25px;
            display: flex;
            align-items: flex-end;
        }

        /* Left Side: Real Logo Wrapper */
        .logo-destination {
            position: absolute;
            left: 10px;
            bottom: 8px;
            z-index: 2;
        }

        .logo-destination img {
            height: 85px; 
            width: 78%;
            display: block;
        }

        /* Right Side: Moving Ambulance facing LEFT */
        .ambulance {
            position: absolute;
            right: -100px; 
            bottom: 4px;
            width: 75px;
            height: 40px;
            /* Plays instantly over exactly 3 seconds to sync with redirect window */
            animation: driveFromRightToLogo 3s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        /* Ambulance Chassis Components */
        .cabin {
            position: absolute;
            left: 0; 
            bottom: 8px;
            width: 22px;
            height: 25px;
            background-color: #009698; /* Custom Teal */
            border-top-left-radius: 8px;
        }

        .cabin-window {
            position: absolute;
            left: 3px;
            top: 4px;
            width: 11px;
            height: 10px;
            background-color: #e6f4f4;
            border-top-left-radius: 4px;
        }

        .back-body {
            position: absolute;
            right: 0;
            bottom: 8px;
            width: 55px;
            height: 32px;
            background-color: #ffffff;
            border: 2px solid #009698;
            border-radius: 0 4px 4px 0;
        }

        /* Red Medical Cross */
        .cross {
            position: absolute;
            top: 9px;
            right: 20px;
            width: 12px;
            height: 12px;
        }
        .cross::before, .cross::after {
            content: '';
            position: absolute;
            background-color: #ff3333;
        }
        .cross::before {
            top: 4px;
            left: 0;
            width: 12px;
            height: 4px;
        }
        .cross::after {
            top: 0;
            left: 4px;
            width: 4px;
            height: 12px;
        }

        /* Intensive Emergency Flashing Siren */
        .siren {
            position: absolute;
            top: 2px;
            left: 16px;
            width: 7px;
            height: 5px;
            background-color: #ff3333;
            border-radius: 3px 3px 0 0;
            animation: intenseBlink 0.2s infinite linear alternate;
        }

        /* Ambient Headlight glow illuminating forward route */
        .headlight-glow {
            position: absolute;
            left: -40px;
            top: 15px;
            width: 40px;
            height: 20px;
            background: linear-gradient(to left, rgba(255, 255, 180, 0.8), rgba(255, 255, 255, 0));
            clip-path: polygon(100% 30%, 0 0, 0 100%, 100% 70%);
            animation: lightFlicker 0.15s infinite alternate;
        }

        /* Wheels */
        .wheel {
            position: absolute;
            bottom: 0;
            width: 11px;
            height: 11px;
            background-color: #222;
            border-radius: 50%;
            border: 2px solid #fff;
        }
        .wheel-left { left: 12px; }
        .wheel-right { right: 12px; }

        /* Loading Text */
        .loading-text {
            color: #004b87;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* Vehicle Movement Animation (Finishes at 3.0 seconds mark) */
        @keyframes driveFromRightToLogo {
            0% {
                right: -100px;
            }
            75% {
                right: 250px; 
                transform: scale(1);
            }
            88% {
                right: 250px;
                transform: scale(1.05, 0.95); /* Braking compression */
            }
            100% {
                right: 250px;
                transform: scale(1); /* Settled flat next to logo */
            }
        }

        /* Blue/Red Beacon flash pattern */
        @keyframes intenseBlink {
            0% { 
                background-color: #ff1a1a; 
                box-shadow: 0 0 15px #ff1a1a, -10px -5px 20px rgba(255, 26, 26, 0.4); 
            }
            49% {
                background-color: #ff1a1a;
                box-shadow: 0 0 15px #ff1a1a;
            }
            50% { 
                background-color: #0066ff; 
                box-shadow: 0 0 15px #0066ff, 10px -5px 20px rgba(0, 102, 255, 0.4); 
            }
            100% {
                background-color: #0066ff;
                box-shadow: 0 0 15px #0066ff;
            }
        }

        /* Headlight micro vibration animation */
        @keyframes lightFlicker {
            0% { opacity: 0.85; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="loader-container">
        <div class="animation-stage">
            
            <div class="logo-destination">
                <img src="https://digitalmarketing-ship-it.github.io/onco/image_website/onco_logo.png" alt="Orchid Sanagati Cancer Centre">
            </div>

            <div class="ambulance">
                <div class="siren"></div>
                <div class="headlight-glow"></div>
                <div class="cabin">
                    <div class="cabin-window"></div>
                </div>
                <div class="back-body">
                    <div class="cross"></div>
                </div>
                <div class="wheel wheel-left"></div>
                <div class="wheel wheel-right"></div>
            </div>

        </div>
        
        <div class="loading-text">Loading Care...</div>
    </div>

    <script>
document.addEventListener('DOMContentLoaded', () => {

    try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        osc.type = 'sawtooth';

        const now = audioCtx.currentTime;

        osc.frequency.setValueAtTime(450, now);

        for (let t = 0; t < 2.8; t += 0.5) {
            osc.frequency.setValueAtTime(650, now + t);
            osc.frequency.setValueAtTime(450, now + t + 0.25);
        }

        gainNode.gain.setValueAtTime(0.12, now);
        gainNode.gain.setValueAtTime(0.12, now + 2.0);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 2.5);

        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        osc.start(now);
        osc.stop(now + 2.7);

    } catch (e) {
        console.log("Audio skipped.");
    }

    // Redirect after loader
    setTimeout(() => {
        window.location.replace("home.html?loaded=1");
    }, 3000);

});
</script>
</body>
</html>
